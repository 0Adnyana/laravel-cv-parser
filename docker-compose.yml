services:
  app:
    image: 0adnyana/laravel-cv-parser:main
    container_name: laravel-cv-parser
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      DB_CONNECTION: pgsql
      DB_URL: ${DB_URL}
    ports:
      - '8000:8000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - app-storage:/app/storage

volumes:
  app-storage:
