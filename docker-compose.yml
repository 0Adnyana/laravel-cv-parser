services:
  app:
    image: 0adnyana/laravel-cv-parser:main
    build: .
    container_name: laravel-cv-parser
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      # Remap the host port when running multiple apps on one host, e.g. "9080:8000"
      - '8000:8000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - app-storage:/app/storage

volumes:
  app-storage:
